<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyNavigate – Login Successful</title>
    <link rel="icon" type="image/png" href="assets/web-icon.png">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, Arial, sans-serif;
            background: #f4f7fc;
            color: #1f2937;
        }
        .card {
            width: min(520px, calc(100% - 32px));
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 28px 24px;
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 30px;
        }
        p {
            margin: 6px 0;
            font-size: 16px;
            line-height: 1.4;
        }
        .ok {
            color: #0f766e;
            font-weight: 700;
        }
        .btn {
            margin-top: 18px;
            display: inline-block;
            text-decoration: none;
            background: #4b82e0;
            color: #fff;
            padding: 11px 16px;
            border-radius: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card" role="status" aria-live="polite">
        <h1>Login Successful</h1>
        <p class="ok">You are now signed in to EasyNavigate.</p>
        <p id="providerText"></p>
        <p id="emailText"></p>
        <a class="btn" href="index.html">Continue to Home</a>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const provider = params.get('provider');
        const name = params.get('name');
        const email = params.get('email');

        const providerText = document.getElementById('providerText');
        const emailText = document.getElementById('emailText');

        if (provider) {
            providerText.textContent = `Signed in with ${provider}${name ? ` as ${name}` : ''}.`;
        } else {
            providerText.textContent = 'Signed in successfully.';
        }

        if (email) {
            emailText.textContent = `Account: ${email}`;
        }
    </script>
</body>
</html>
